apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
    run.googleapis.com/maxScale: '20'
    run.googleapis.com/urls: '["https://citymind-adk-440231657585.asia-south1.run.app","https://citymind-adk-va62x64y2q-el.a.run.app"]'
  labels:
    cloud.googleapis.com/location: asia-south1
    run.googleapis.com/satisfiesPzs: 'true'
  name: citymind-adk
  namespace: '440231657585'
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '20'
        run.googleapis.com/client-name: gcloud
        run.googleapis.com/client-version: 575.0.0
        run.googleapis.com/startup-cpu-boost: 'true'
      labels:
        client.knative.dev/nonce: rvatuvrahb
        run.googleapis.com/startupProbeType: Default
    spec:
      containerConcurrency: 80
      containers:
      - env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              key: latest
              name: citymind-google-api-key
        - name: CITYMIND_INTERNAL_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              key: latest
              name: citymind-internal-service-token
        - name: CITYMIND_BACKEND_BASE_URL
          value: https://citymind-api-va62x64y2q-el.a.run.app
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: 'FALSE'
        image: asia-south1-docker.pkg.dev/citymind-apac/citymind/citymind-adk:latest
        ports:
        - containerPort: 8080
          name: http1
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
        startupProbe:
          failureThreshold: 1
          periodSeconds: 240
          tcpSocket:
            port: 8080
          timeoutSeconds: 240
      serviceAccountName: citymind-runtime@citymind-apac.iam.gserviceaccount.com
      timeoutSeconds: 300
  traffic:
  - latestRevision: true
    percent: 100
